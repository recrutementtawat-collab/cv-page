<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السيرة الذاتية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}

.container{
max-width:900px;
margin:40px auto;
background:#ffffff10;
backdrop-filter: blur(10px);
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
margin:0;
font-size:28px;
}

.section{
margin-bottom:25px;
padding:15px;
background:#ffffff08;
border-radius:15px;
transition:0.3s;
}

.section:hover{
transform:scale(1.02);
background:#ffffff15;
}

.section h2{
margin-bottom:10px;
color:#00d4ff;
}

.item{
margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1 id="name">...</h1>
</div>

<div class="section">
<h2>📌 المعلومات الشخصية</h2>
<div class="item" id="birth"></div>
<div class="item" id="city"></div>
<div class="item" id="gender"></div>
<div class="item" id="status"></div>
<div class="item" id="nationality"></div>
</div>

<div class="section">
<h2>📞 معلومات الاتصال</h2>
<div class="item" id="phone"></div>
<div class="item" id="email"></div>
<div class="item" id="address"></div>
</div>

<div class="section">
<h2>🎖 الخدمة الوطنية</h2>
<div class="item" id="service"></div>
</div>

</div>

<script>

// 🔴 ضع رابط Google Sheet JSON هنا
const url = "https://api.sheetbest.com/sheets/18830000-9db4-4925-bd70-d66fd4544eae";

fetch(url)
.then(res => res.json())
.then(data => {

let user = data[data.length - 1]; // آخر مترشح

function show(id, label, value){
document.getElementById(id).innerText =
value && value !== "undefined" ? label + ": " + value : "";
}

// ⚠️ عدل الأسماء حسب الشيت
show("name","الاسم", user["الاسم الكامل"]);
show("birth","تاريخ الميلاد", user["تاريخ الميلاد"]);
show("city","مكان الميلاد", user["مكان الميلاد"]);
show("gender","الجنس", user["الجنس"]);
show("status","الحالة العائلية", user["الحالة العائلية"]);
show("nationality","الجنسية", user["الجنسية"]);

show("phone","الهاتف", user["رقم الهاتف"]);
show("email","البريد", user["البريد الإلكتروني"]);
show("address","العنوان", user["العنوان الكامل"]);

show("service","الخدمة الوطنية", user["الوضعية تجاه الخدمة الوطنية"]);

})

.catch(err=>{
console.log(err);
});

</script>

</body>
</html>
