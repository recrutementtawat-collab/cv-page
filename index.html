<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المترشحين</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  background: #0f172a;
  color: white;
  direction: rtl;
  margin: 0;
}

#cards-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
  max-height: 350px;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.03);
  background: #334155;
}

.card h3 {
  color: #38bdf8;
  margin-bottom: 10px;
}

.card p {
  font-size: 13px;
  margin: 4px 0;
}

/* Popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.popup-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  max-height: 80%;
  overflow-y: auto;
}

#close {
  float: left;
  font-size: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;">قائمة المترشحين</h1>

<div id="cards-container"></div>

<!-- Popup -->
<div id="popup" class="hidden">
  <div class="popup-content">
    <span id="close">&times;</span>
    <div id="details"></div>
  </div>
</div>

<script>
const API_URL = "https://api.sheetbest.com/sheets/18830000-9db4-4925-bd70-d66fd4544eae";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("cards-container");

    data.forEach(person => {
      const card = document.createElement("div");
      card.className = "card";

      let content = "";

      // الاسم في الأعلى
      content += `<h3>${person["الاسم الكامل"] || "بدون اسم"}</h3>`;

      // عرض كل الأعمدة داخل البطاقة
      for (let key in person) {
        if (key !== "الاسم الكامل") {
          content += `<p><strong>${key}:</strong> ${person[key] || "-"}</p>`;
        }
      }

      card.innerHTML = content;

      // عند الضغط → عرض التفاصيل
      card.onclick = () => showDetails(person);

      container.appendChild(card);
    });
  });

function showDetails(person) {
  const popup = document.getElementById("popup");
  const details = document.getElementById("details");

  let content = `<h2>${person["الاسم الكامل"] || ""}</h2>`;

  for (let key in person) {
    content += `<p><strong>${key}:</strong> ${person[key] || "-"}</p>`;
  }

  details.innerHTML = content;
  popup.classList.remove("hidden");
}

document.getElementById("close").onclick = () => {
  document.getElementById("popup").classList.add("hidden");
};
</script>

</body>
</html>
